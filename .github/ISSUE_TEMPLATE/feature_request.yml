name: Feature Request / 功能建议
description: Suggest an improvement for PyREUser3 / 为 PyREUser3 提出改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area / 范围
      multiple: true
      options:
        - Python API
        - CLI
        - Web UI
        - Export parser
        - Packer
        - Packaging
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / 现有痛点
      description: What problem would this feature solve?
      placeholder: Describe the workflow that is currently hard, missing, or error-prone.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal / 建议方案
      description: What should PyREUser3 add or change?
      placeholder: Describe the desired API, CLI option, Web UI behavior, or output format.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives / 替代方案
      description: Have you tried a workaround or considered another design?
    validations:
      required: false

  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility Notes / 兼容性说明
      description: Mention any expected impact on existing JSON output, pack format, CLI arguments, or Python API.
    validations:
      required: false
