name: Close Stale Issues

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          days-before-issue-stale: 30
          days-before-issue-close: 7
          days-before-pr-stale: -1
          days-before-pr-close: -1

          close-issue-reason: "not_planned"

          stale-issue-label: "stale"
          exempt-issue-labels: "pinned,security,wip,needs-maintainer-review"

          stale-issue-message: |
            This issue has been marked as stale because there has been no activity for 30 days. It will be closed in 7 days if there is no further activity.

            If this is still relevant, please leave a comment with updated PyREUser3 version information, reproduction steps, or logs.

            ---

            由于 30 天内没有活动，此 Issue 已被标记为过期。如果未来 7 天内仍无进一步活动，它将被自动关闭。

            如果问题仍然存在，请补充最新的 PyREUser3 版本信息、复现步骤或日志。

          close-issue-message: |
            This issue has been closed due to inactivity. If the problem still exists, please open a new issue with the current PyREUser3 version, Python version, reproduction steps, and logs.

            ---

            由于长时间未收到进一步信息，此 Issue 已被自动关闭。如果问题仍然存在，请使用当前 PyREUser3 版本、Python 版本、复现步骤和日志重新提交。
